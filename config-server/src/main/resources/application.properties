spring.application.name=config-server
server.port=8888

#eureka registration
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

#config server
#charger les fichiers de configuration localement
# Active le mode "native" du Spring Cloud Config Server
# Cela signifie que les fichiers de configuration sont lus depuis un stockage local (filesystem)
spring.profiles.active=native

# Configuration mode classpath (non recommandé pour un environnement de développement réel)
# Les fichiers sont inclus dans le JAR de l'application
# Inconvénient : les modifications ne sont pas prises en compte sans redémarrage du Config Server
# spring.cloud.config.server.native.searchLocations=classpath:/config

# Configuration mode filesystem (recommandé pour le développement local)
# Les fichiers sont lus directement depuis un dossier externe au projet
# Avantage : les modifications sont prises en compte immédiatement sans redémarrage du Config Server
spring.cloud.config.server.native.searchLocations=file:./config
#spring.cloud.config.server.git.uri=https://github.com/my/servercloudconfig.git

